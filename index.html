<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI - Premium Review Edition</title>
    
    <!-- External styling library used to draw the chess board grid squares -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Base Layout */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Flexbox wrapper that hosts the Board on the left and the Dashboard on the right */
        .app-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 1050px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        /* Container stacking elements vertically */
        .board-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 24px;
        }

        /* Setup Lobby Controls Panel */
        .lobby-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 400px;
            max-width: 90vw;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            border: 1px solid #2a2a2a;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 110px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            font-weight: 600;
        }

        select {
            background: #2b2b2b;
            color: #fff;
            border: 1px solid #3a3a3a;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        /* Status Text Container and Restart Button wrapper */
        .panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            max-width: 90vw;
            background: #1e1e1e;
            padding: 10px 15px;
            border-radius: 6px;
            box-sizing: border-box;
            border: 1px solid #2a2a2a;
        }

        #status {
            font-size: 14px;
            font-weight: 500;
            color: #b3b3b3;
        }

        #restart-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background-color: #d35400;
        }

        /* Visual configuration for the graphical board element */
        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }

        /* Side Dashboard panel dedicated to logging algebraic chess notations and annotations */
        .sidebar {
            width: 320px;
            height: 560px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .sidebar-header {
            background: #252525;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #2a2a2a;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            color: #e67e22;
        }

        /* Scrollable layout structure inside the live sidebar text element */
        #move-history {
            padding: 12px;
            overflow-y: auto;
            flex-grow: 1;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #d4d4d4;
        }

        /* Wider grid columns to support move notation + dynamic review classification tags */
        .move-row {
            display: grid;
            grid-template-columns: 35px 130px 130px;
            border-bottom: 1px solid #252525;
            padding: 6px 0;
        }

        .move-number {
            color: #757575;
        }

        /* Dynamic evaluation label badges */
        .badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 5px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-brilliant { background: #1baca2; color: #fff; }
        .badge-best { background: #81b64c; color: #fff; }
        .badge-good { background: #4e702e; color: #ccc; }
        .badge-inaccuracy { background: #f7c04a; color: #333; }
        .badge-mistake { background: #e67e22; color: #fff; }
        .badge-blunder { background: #b43c3c; color: #fff; }

        /* Game Review Navigation Panel Box */
        .review-panel {
            display: none; /* Hidden until match finishes */
            background: #252525;
            padding: 10px;
            border-top: 1px solid #2a2a2a;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
            flex-direction: column;
            gap: 10px;
        }

        .review-buttons {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .review-btn {
            background: #333;
            color: #fff;
            border: 1px solid #444;
            padding: 8px;
            flex: 1;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: background 0.2s;
        }

        .review-btn:hover {
            background: #444;
            border-color: #555;
        }

        /* Dynamic Engine Reasoning Feedback Feed Box */
        #review-reasoning {
            background: #1a1a1a;
            border: 1px solid #2d2d2d;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            color: #b3b3b3;
            min-height: 36px;
            line-height: 1.4;
        }

        /* CSS Media Query: Automatically stacks sidebar underneath the board layout on mobile screens */
        @media (max-width: 700px) {
            .app-layout {
                flex-direction: column;
                align-items: center;
            }
            .sidebar {
                width: 400px;
                max-width: 90vw;
                height: 280px;
            }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        
        <!-- Left Column: Settings and Game Board -->
        <div class="board-container">
            <h1>Chess Buddy AI</h1>
            
            <div class="lobby-panel">
                <div class="control-group">
                    <label>Your Color</label>
                    <select id="color-select" onchange="resetGame()">
                        <option value="w">White</option>
                        <option value="b">Black</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Opponent AI</label>
                    <select id="bot-select" onchange="resetGame()">
                        <option value="1">Pawnawan (800 Elo)</option>
                        <option value="2">The Tactician (1500 Elo)</option>
                        <option value="3" selected>Grandmaster Buddy (2200 Elo)</option>
                    </select>
                </div>
            </div>

            <div class="panel">
                <div id="status">Your turn (White)</div>
                <button id="restart-btn" onclick="resetGame()">Restart</button>
            </div>
            <div id="my-board"></div>
        </div>

        <!-- Right Column: Dashboard Move History & Review Controls -->
        <div class="sidebar">
            <div class="sidebar-header">Live Move Log</div>
            <div id="move-history"></div>
            
            <!-- Game Review Navigation System Buttons & Engine Coach Insights -->
            <div class="review-panel" id="review-controls">
                <div id="review-reasoning">Click Prev/Next buttons to run coach analysis feedback...</div>
                <div class="review-buttons">
                    <button class="review-btn" onclick="reviewMove(-1)">◀ Prev</button>
                    <button class="review-btn" onclick="reviewMove(1)">Next ▶</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Essential script libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        var game = new Chess();       
        var board = null;             
        var $status = $('#status');   
        var $historyContainer = $('#move-history'); 

        // Game Review Tracking Cache Arrays
        var isReviewMode = false;
        var reviewHistoryList = [];       // Pure notation list ['e4', 'e5', ...]
        var reviewMoveObjects = [];       // Full move details from chess.js
        var reviewEvaluations = [];       // Parallel array storing raw board evaluations AFTER each move
        var reviewClassifications = [];  // Decoded classification tags for each index
        var reviewReasonings = [];        // AI Coach feedback strings for each index
        var reviewCurrentIndex = -1;

        // Sound generation engine
        function playSound(isCapture) {
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                if (isCapture) {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) { console.log("Audio not supported"); }
        }

        // Piece Evaluation mapping weights
        function getPieceValue(piece) {
            if (piece === null) return 0;
            var values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
            var value = values[piece.type];
            return piece.color === 'w' ? value : -value;
        }

        // Global Board Total Value Evaluation Loop
        function evaluateBoard(boardState) {
            var totalEvaluation = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(boardState[i][j]);
                }
            }
            return totalEvaluation;
        }

        // Minimax deep loop calculation module with alpha-beta processing cuts
        function minimax(depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0 || game.game_over()) return evaluateBoard(game.board());
            var possibleMoves = game.moves();

            if (isMaximizingPlayer) {
                var bestValue = -99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.max(bestValue, minimax(depth - 1, alpha, beta, false));
                    game.undo();
                    alpha = Math.max(alpha, bestValue);
                    if (beta <= alpha) break;
                }
                return bestValue;
            } else {
                var bestValue = 99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.min(bestValue, minimax(depth - 1, alpha, beta, true));
                    game.undo();
                    beta = Math.min(beta, bestValue);
                    if (beta <= alpha) break;
                }
                return bestValue;
            }
        }

        // Status bar and log view rendering controller
        function updateStatusAndLog() {
            var statusText = '';
            var userColor = $('#color-select').val();
            var botName = $('#bot-select option:selected').text().split(' (')[0];
            
            var isBotTurn = game.turn() !== userColor;

            if (game.game_over()) {
                statusText = 'Game Over! Review Mode Unlocked.';
                activateGameReview();
            } else if (isReviewMode) {
                statusText = 'Reviewing Move ' + (reviewCurrentIndex + 1) + ' / ' + reviewHistoryList.length;
            } else {
                statusText = isBotTurn ? botName + ' is thinking...' : "Your turn";
                if (game.in_check()) statusText += ' - CHECK!';
            }
            $status.html(statusText);

            // Populate notation log strings
            var history = isReviewMode ? reviewHistoryList : game.history();
            var html = '';
            for (var i = 0; i < history.length; i += 2) {
                var moveNum = Math.floor(i / 2) + 1;
                
                var whiteMove = history[i];
                var blackMove = history[i + 1] ? history[i + 1] : '';
                
                // Fetch dynamic tags if they exist inside compilation data streams
                var whiteBadge = (isReviewMode && reviewClassifications[i]) ? reviewClassifications[i] : '';
                var blackBadge = (isReviewMode && reviewClassifications[i + 1]) ? reviewClassifications[i + 1] : '';

                // Active text highlight tracers
                var activeClassW = (isReviewMode && reviewCurrentIndex === i) ? 'style="color:#e67e22; font-weight:bold;"' : '';
                var activeClassB = (isReviewMode && reviewCurrentIndex === i + 1) ? 'style="color:#e67e22; font-weight:bold;"' : '';

                html += '<div class="move-row">' +
                        '<span class="move-number">' + moveNum + '.</span>' +
                        '<span ' + activeClassW + '>' + whiteMove + whiteBadge + '</span>' +
                        '<span ' + activeClassB + '>' + blackMove + blackBadge + '</span>' +
                        '</div>';
            }
            $historyContainer.html(html);
            
            if (!isReviewMode) {
                $historyContainer.scrollTop($historyContainer[0].scrollHeight);
            }
        }

        /**
         * MASTER REVIEW ANALYSIS COMPILER
         * Walks backwards through the completed game, evaluating alternatives step by step
         * to classify every single move with reasoning feedback!
         */
        function activateGameReview() {
            if (isReviewMode) return;
            isReviewMode = true;
            
            reviewHistoryList = game.history();
            
            // Extract the deep dictionary profiles generated by chess.js during active gameplay loops
            var rawHistoryObjects = game.history({ verbose: true });
            
            // Spin up an independent background calculation referee model to evaluate shifts sequentially
            var analysisGame = new Chess();
            var initialEval = 0; // Starting baseline position evaluation (0.00)
            
            for (var i = 0; i < reviewHistoryList.length; i++) {
                var currentMoveObj = rawHistoryObjects[i];
                var movingColor = currentMoveObj.color; // 'w' or 'b'
                
                // Get all alternative options before executing the actual move to check for top paths
                var legalAlternatives = analysisGame.moves();
                
                // Execute the move on the tracker to measure real positional outcome
                analysisGame.move(reviewHistoryList[i]);
                var postEval = evaluateBoard(analysisGame.board());
                
                // Determine the true evaluation shift delta relative to the moving side's perspective
                var evalDrop = 0;
                if (movingColor === 'w') {
                    evalDrop = initialEval - postEval; // If positive, White lost advantage points
                } else {
                    evalDrop = postEval - initialEval; // If positive, Black lost advantage points
                }
                
                // Default fallback assignment rules
                var classification = '<span class="badge badge-good">Good</span>';
                var reasoning = "A solid, playable move that keeps the position balanced.";

                // Check for dynamic tactical labels using mathematical boundaries
                if (evalDrop >= 15) {
                    classification = '<span class="badge badge-blunder">🔴 Blunder</span>';
                    reasoning = `Blunder! This move dropped over 1.5 points of piece equity. You left a critical asset hanging or missed a major tactical threat.`;
                } else if (evalDrop >= 6) {
                    classification = '<span class="badge badge-mistake">🟠 Mistake</span>';
                    reasoning = `Mistake. This choice values around 0.6 to 1.5 material metrics below optimal paths. Better defensive lines were open.`;
                } else if (evalDrop >= 3) {
                    classification = '<span class="badge badge-inaccuracy">🟡 Inaccuracy</span>';
                    reasoning = `Inaccuracy. Not the cleanest setup line. You conceded a minor structural edge back over to your opponent.`;
                } else {
                    // Check if this move was the single highest scored move choice or a hard tactical blow
                    var wasTacticalCapture = currentMoveObj.captured && (currentMoveObj.piece === 'p' || currentMoveObj.piece === 'n' || currentMoveObj.piece === 'b') && (currentMoveObj.captured === 'q' || currentMoveObj.captured === 'r');
                    
                    if (wasTacticalCapture && evalDrop <= 0) {
                        classification = '<span class="badge badge-brilliant">⭐ Brilliant</span>';
                        reasoning = `Brilliant!! A spectacular tactical choice that secures an immediate material swing or sharp positional victory line.`;
                    } else if (evalDrop <= -1) {
                        classification = '<span class="badge badge-best">✨ Best Move</span>';
                        reasoning = `The absolute best tactical development path. This line maximizes your active piece control and territory weight.`;
                    }
                }

                // Append computed details to cache
                reviewClassifications.push(classification);
                reviewReasonings.push(reasoning);
                reviewEvaluations.push(postEval);
                
                // Rotate state variable to update previous step evaluation frame indexes
                initialEval = postEval;
            }

            // Reset navigation indices down to final frame and show controls
            reviewCurrentIndex = reviewHistoryList.length - 1;
            $('#review-controls').css('display', 'flex');
            
            // Trigger coach text updates
            reviewMove(0); 
        }

        // Updates position values backward or forward during analysis reviews
        function reviewMove(direction) {
            var targetIndex = reviewCurrentIndex + direction;
            if (targetIndex < -1 || targetIndex >= reviewHistoryList.length) return;
            
            reviewCurrentIndex = targetIndex;
            
            // Re-simulate safe board visual states down to current index pointers
            var reviewGame = new Chess();
            for (var i = 0; i <= reviewCurrentIndex; i++) {
                reviewGame.move(reviewHistoryList[i]);
            }
            
            board.position(reviewGame.fen());
            playSound(false);
            
            // Print dynamic engine coach details directly into the dashboard
            if (reviewCurrentIndex >= 0) {
                var currentReason = reviewReasonings[reviewCurrentIndex];
                var numericScore = (reviewEvaluations[reviewCurrentIndex] / 10).toFixed(2);
                
                // Append text readouts to coaching div container
                $('#review-reasoning').html(`<strong>Score Balance:</strong> ${numericScore}<br>${currentReason}`);
            } else {
                $('#review-reasoning').html("Starting Position. Use buttons to evaluate moves.");
            }
            
            updateStatusAndLog();
        }

        function makeBestMove() {
            var possibleMoves = game.moves();
            if (game.game_over()) { updateStatusAndLog(); return; }

            possibleMoves.sort(function() { return 0.5 - Math.random(); });
            
            var selectedBotDifficulty = parseInt($('#bot-select').val()); 
            var searchDepth = selectedBotDifficulty; 
            
            var bestMove = null;
            var isBotWhite = game.turn() === 'w';
            var bestValue = isBotWhite ? -99999 : 99999;

            for (var i = 0; i < possibleMoves.length; i++) {
                var move = possibleMoves[i];
                game.move(move);
                var boardValue = minimax(searchDepth - 1, -100000, 100000, !isBotWhite); 
                game.undo();

                if (isBotWhite) {
                    if (boardValue > bestValue) {
                        bestValue = boardValue;
                        bestMove = move;
                    }
                } else {
                    if (boardValue < bestValue) {
                        bestValue = boardValue;
                        bestMove = move;
                    }
                }
            }

            var testGame = new Chess(game.fen());
            var moveDetails = testGame.move(bestMove);
            var isCapture = moveDetails && (moveDetails.captured || moveDetails.flags.includes('e'));

            game.move(bestMove);
            board.position(game.fen());
            playSound(isCapture);
            updateStatusAndLog();
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            if (isReviewMode) return 'snapback';
            
            var userColor = $('#color-select').val();
            if (game.turn() !== userColor) return 'snapback';
            if (piece.search(new RegExp('^' + userColor)) === -1) return 'snapback';

            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            var isCapture = move.captured || move.flags.includes('e');
            playSound(isCapture);
            updateStatusAndLog();

            window.setTimeout(function() {
                board.position(game.fen());
                window.setTimeout(makeBestMove, 250);
            }, 250);
        }

        function resetGame() {
            // Hard clean global state flags
            isReviewMode = false;
            reviewHistoryList = [];
            reviewClassifications = [];
            reviewReasonings = [];
            reviewEvaluations = [];
            reviewCurrentIndex = -1;
            
            $('#review-controls').css('display', 'none');
            $('#review-reasoning').html("Click Prev/Next buttons to run coach analysis feedback...");

            game.reset();
            var userColor = $('#color-select').val();
            board.orientation(userColor === 'w' ? 'white' : 'black');
            board.start();
            updateStatusAndLog();

            if (userColor === 'b') {
                window.setTimeout(makeBestMove, 500);
            }
        }

        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop 
        };
        
        board = Chessboard('my-board', config);
        updateStatusAndLog();
    </script>
</body>
</html>
