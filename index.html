<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Styling */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h1>Chess Buddy AI</h1>
    
    <div id="my-board"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        // Initialize the referee engine
        var game = new Chess();
        var board = null;

        // This function runs every single time you drop a piece
        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            // Ask the referee if this move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' // Automatically promote pawns to queens for simplicity
            });

            // If the referee says it's illegal, snap the piece back to its starting square
            if (move === null) return 'snapback';
        }

        // Configuration setup
        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop // Link our move checker function to the board
        };
        
        board = Chessboard('my-board', config);
    </script>
</body>
</html>
