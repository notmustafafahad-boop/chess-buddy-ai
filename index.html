<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI</title>
    
    <!-- Styling library for the chess board squares -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Styling */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* Status & Control Panel */
        .panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            max-width: 90vw;
            background: #1e1e1e;
            padding: 10px 15px;
            border-radius: 6px;
            box-sizing: border-box;
            border: 1px solid #2a2a2a;
        }

        #status {
            font-size: 14px;
            font-weight: 500;
            color: #b3b3b3;
        }

        #restart-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background-color: #d35400;
        }

        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Chess Buddy AI</h1>
        
        <!-- New Live Status & Restart Controls -->
        <div class="panel">
            <div id="status">Your turn (White)</div>
            <button id="restart-btn" onclick="resetGame()">Restart</button>
        </div>

        <!-- The Chess Board Container -->
        <div id="my-board"></div>
    </div>

    <!-- JavaScript libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        var game = new Chess();
        var board = null;
        var $status = $('#status');

        // Synthetic Sound Generator (No file uploads required!)
        function playSound(isCapture) {
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (isCapture) {
                    // Quick sharp metallic sound for captures
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                } else {
                    // Wood thud sound for normal moves
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) { console.log("Audio not supported yet"); }
        }

        // Live panel text updater
        function updateStatus() {
            var statusText = '';
            var moveColor = game.turn() === 'b' ? 'Black (AI)' : 'White (You)';

            if (game.in_checkmate()) {
                statusText = 'Game Over! ' + moveColor + ' is in checkmate.';
            } else if (game.in_draw()) {
                statusText = 'Game Over! Draw position.';
            } else {
                statusText = moveColor + "'s turn";
                if (game.in_check()) {
                    statusText += ' - CHECK!';
                }
            }
            $status.html(statusText);
        }

        function getPieceValue(piece) {
            if (piece === null) return 0;
            var values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
            var value = values[piece.type];
            return piece.color === 'w' ? value : -value;
        }

        function evaluateBoard(boardState) {
            var totalEvaluation = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(boardState[i][j]);
                }
            }
            return totalEvaluation;
        }

        function minimax(depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0 || game.game_over()) {
                return evaluateBoard(game.board());
            }

            var possibleMoves = game.moves();

            if (isMaximizingPlayer) {
                var bestValue = -99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.max(bestValue, minimax(depth - 1, alpha, beta, false));
                    game.undo();
                    alpha = Math.max(alpha, bestValue);
                    if (beta <= alpha) break;
                }
                return bestValue;
            } else {
                var bestValue = 99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.min(bestValue, minimax(depth - 1, alpha, beta, true));
                    game.undo();
                    beta = Math.min(beta, bestValue);
                    if (beta <= alpha) break;
                }
                return bestValue;
            }
        }

        function makeBestMove() {
            var possibleMoves = game.moves();

            if (game.game_over()) {
                updateStatus();
                return;
            }

            possibleMoves.sort(function() { return 0.5 - Math.random(); });

            var bestMove = null;
            var bestValue = 99999;

            for (var i = 0; i < possibleMoves.length; i++) {
                var move = possibleMoves[i];
                game.move(move);
                var boardValue = minimax(2, -100000, 100000, true); 
                game.undo();

                if (boardValue < bestValue) {
                    bestValue = boardValue;
                    bestMove = move;
                }
            }

            // Check if the AI's move is a capture right before making it
            var testGame = new Chess(game.fen());
            var moveDetails = testGame.move(bestMove);
            var isCapture = moveDetails && (moveDetails.captured || moveDetails.flags.includes('e'));

            game.move(bestMove);
            board.position(game.fen());
            playSound(isCapture);
            updateStatus();
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            // Play player move audio
            var isCapture = move.captured || move.flags.includes('e');
            playSound(isCapture);
            updateStatus();

            window.setTimeout(function() {
                board.position(game.fen());
                window.setTimeout(makeBestMove, 250);
            }, 250);
        }

        // Restart Game Action
        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop 
        };
        
        board = Chessboard('my-board', config);
        updateStatus();
    </script>
</body>
</html>
