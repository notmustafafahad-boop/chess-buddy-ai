<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Styling */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h1>Chess Buddy AI</h1>
    <div id="my-board"></div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        var game = new Chess();
        var board = null;

        // Piece evaluation scores
        function getPieceValue(piece) {
            if (piece === null) return 0;
            var values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
            var value = values[piece.type];
            return piece.color === 'w' ? value : -value;
        }

        // Tally board state
        function evaluateBoard(boardState) {
            var totalEvaluation = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(boardState[i][j]);
                }
            }
            return totalEvaluation;
        }

        // Minimax with Alpha-Beta Pruning Optimization
        function minimax(depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0 || game.game_over()) {
                return evaluateBoard(game.board());
            }

            var possibleMoves = game.moves();

            if (isMaximizingPlayer) {
                var bestValue = -99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.max(bestValue, minimax(depth - 1, alpha, beta, false));
                    game.undo();
                    
                    alpha = Math.max(alpha, bestValue);
                    if (beta <= alpha) {
                        break; // Prune branch: Skip calculating remaining sibling moves
                    }
                }
                return bestValue;
            } else {
                var bestValue = 99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.min(bestValue, minimax(depth - 1, alpha, beta, true));
                    game.undo();
                    
                    beta = Math.min(beta, bestValue);
                    if (beta <= alpha) {
                        break; // Prune branch: Skip calculating remaining sibling moves
                    }
                }
                return bestValue;
            }
        }

        // Triggers the lookahead logic
        function makeBestMove() {
            var possibleMoves = game.moves();

            if (game.game_over()) {
                alert('Game over!');
                return;
            }

            // Sort randomly to break evaluation ties naturally
            possibleMoves.sort(function() { return 0.5 - Math.random(); });

            var bestMove = null;
            var bestValue = 99999; // Looking for lowest score (Black advantage)

            // We search to total Depth 3, passing extreme initial bounds for alpha and beta
            for (var i = 0; i < possibleMoves.length; i++) {
                var move = possibleMoves[i];
                game.move(move);
                var boardValue = minimax(2, -100000, 100000, true); 
                game.undo();

                if (boardValue < bestValue) {
                    bestValue = boardValue;
                    bestMove = move;
                }
            }

            game.move(bestMove);
            board.position(game.fen());

            if (game.game_over()) {
                alert('Game over!');
            }
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            window.setTimeout(function() {
                board.position(game.fen());
                window.setTimeout(makeBestMove, 250);
            }, 250);
        }

        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop 
        };
        
        board = Chessboard('my-board', config);
    </script>
</body>
</html>
