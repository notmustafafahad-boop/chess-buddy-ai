<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI</title>
    
    <!-- Styling library for the chess board squares -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Styling */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h1>Chess Buddy AI</h1>
    
    <!-- This is where the chess board renders on the screen -->
    <div id="my-board"></div>

    <!-- JavaScript libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        var game = new Chess();
        var board = null;

        function makeRandomMove () {
            var possibleMoves = game.moves();

            // Game over checks
            if (game.game_over()) {
                alert('Game over!');
                return;
            }

            // Pick a random move from the list of legal options
            var randomIdx = Math.floor(Math.random() * possibleMoves.length);
            game.move(possibleMoves[randomIdx]);
            
            // Update the visual board with the AI's move
            board.position(game.fen());

            // Check if AI's move ended the game
            if (game.game_over()) {
                alert('Game over!');
            }
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            // See if the player's move is legal
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            // If illegal, snap back
            if (move === null) return 'snapback';

            // Sync visual positions (handles en passant/castling graphics)
            window.setTimeout(function() {
                board.position(game.fen());
                
                // Trigger the AI to move 250 milliseconds after the player finishes
                window.setTimeout(makeRandomMove, 250);
            }, 250);
        }

        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop 
        };
        
        board = Chessboard('my-board', config);
    </script>
</body>
</html>
