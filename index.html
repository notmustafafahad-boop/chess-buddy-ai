<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI</title>
    
    <!-- Styling library for the chess board squares -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Styling */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <h1>Chess Buddy AI</h1>
    <div id="my-board"></div>

    <!-- JavaScript libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        var game = new Chess();
        var board = null;

        // Assign numeric values to pieces (Positive for White, Negative for Black)
        function getPieceValue(piece) {
            if (piece === null) return 0;
            
            var values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
            var value = values[piece.type];
            
            return piece.color === 'w' ? value : -value;
        }

        // Tally up the score of the entire board
        function evaluateBoard(boardState) {
            var totalEvaluation = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(boardState[i][j]);
                }
            }
            return totalEvaluation;
        }

        // Look ahead 1 move and pick the absolute best option
        function makeBestMove() {
            var possibleMoves = game.moves();

            if (game.game_over()) {
                alert('Game over!');
                return;
            }

            var bestMove = null;
            // We want the lowest score because Black pieces are negative values
            var bestValue = 9999; 

            for (var i = 0; i < possibleMoves.length; i++) {
                var move = possibleMoves[i];
                game.move(move); // Test the move out in the referee's head
                
                var boardValue = evaluateBoard(game.board());
                game.undo(); // Take the test move back

                if (boardValue < bestValue) {
                    bestValue = boardValue;
                    bestMove = move;
                }
            }

            // Execute the winning move
            game.move(bestMove);
            board.position(game.fen());

            if (game.game_over()) {
                alert('Game over!');
            }
        }

        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q' 
            });

            if (move === null) return 'snapback';

            window.setTimeout(function() {
                board.position(game.fen());
                // Trigger the smart AI calculation
                window.setTimeout(makeBestMove, 250);
            }, 250);
        }

        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop 
        };
        
        board = Chessboard('my-board', config);
    </script>
</body>
</html>
