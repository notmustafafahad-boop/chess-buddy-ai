<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Buddy AI - Bot Lobby</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <style>
        /* Modern Dark Mode Base Layout */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* Flexbox wrapper that hosts the Board on the left and the Dashboard on the right */
        .app-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            max-width: 950px;
            width: 100%;
            justify-content: center;
            align-items: flex-start;
        }

        /* Container stacking elements vertically */
        .board-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.5px;
            font-size: 24px;
        }

        /* Setup Lobby Controls Panel */
        .lobby-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 400px;
            max-width: 90vw;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            box-sizing: border-box;
            border: 1px solid #2a2a2a;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 110px;
        }

        label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            font-weight: 600;
        }

        select {
            background: #2b2b2b;
            color: #fff;
            border: 1px solid #3a3a3a;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }

        /* Status Text Container and Restart Button wrapper */
        .panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 400px;
            max-width: 90vw;
            background: #1e1e1e;
            padding: 10px 15px;
            border-radius: 6px;
            box-sizing: border-box;
            border: 1px solid #2a2a2a;
        }

        #status {
            font-size: 14px;
            font-weight: 500;
            color: #b3b3b3;
        }

        #restart-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background-color: #d35400;
        }

        /* Visual configuration for the graphical board element */
        #my-board {
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 12px 36px rgba(0,0,0,0.6);
            border-radius: 6px;
            overflow: hidden;
        }

        /* Side Dashboard panel dedicated to logging algebraic chess notations */
        .sidebar {
            width: 240px;
            height: 560px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .sidebar-header {
            background: #252525;
            padding: 12px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid #2a2a2a;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            color: #e67e22;
        }

        /* Scrollable layout structure inside the live sidebar text element */
        #move-history {
            padding: 12px;
            overflow-y: auto;
            flex-grow: 1;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #d4d4d4;
        }

        /* Formatted structural columns for Move Index, White Move, and Black Move */
        .move-row {
            display: grid;
            grid-template-columns: 35px 80px 80px;
            border-bottom: 1px solid #252525;
            padding: 4px 0;
        }

        .move-number {
            color: #757575;
        }

        /* CSS Media Query: Automatically stacks sidebar underneath the board layout on mobile screens */
        @media (max-width: 700px) {
            .app-layout {
                flex-direction: column;
                align-items: center;
            }
            .sidebar {
                width: 400px;
                max-width: 90vw;
                height: 150px;
            }
        }
    </style>
</head>
<body>

    <div class="app-layout">
        
        <div class="board-container">
            <h1>Chess Buddy AI</h1>
            
            <div class="lobby-panel">
                <div class="control-group">
                    <label>Your Color</label>
                    <select id="color-select" onchange="resetGame()">
                        <option value="w">White</option>
                        <option value="b">Black</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Opponent AI</label>
                    <select id="bot-select" onchange="resetGame()">
                        <option value="1">Pawnawan (800 Elo)</option>
                        <option value="2">The Tactician (1500 Elo)</option>
                        <option value="3" selected>Grandmaster Buddy (2200 Elo)</option>
                    </select>
                </div>
            </div>

            <div class="panel">
                <div id="status">Your turn (White)</div>
                <button id="restart-btn" onclick="resetGame()">Restart</button>
            </div>
            <div id="my-board"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">Live Move Log</div>
            <div id="move-history"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script>
        var game = new Chess();       
        var board = null;             
        var $status = $('#status');   
        var $historyContainer = $('#move-history'); 

        // Sound generation engine
        function playSound(isCapture) {
            try {
                var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                var osc = audioCtx.createOscillator();
                var gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                if (isCapture) {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.15);
                }
            } catch (e) { console.log("Audio not supported"); }
        }

        // Status bar and log view rendering controller
        function updateStatusAndLog() {
            var statusText = '';
            var userColor = $('#color-select').val();
            var botName = $('#bot-select option:selected').text().split(' (')[0];
            
            var isBotTurn = game.turn() !== userColor;
            var moveColorName = isBotTurn ? botName : 'Your';

            if (game.in_checkmate()) {
                statusText = 'Game Over! ' + (isBotTurn ? 'You win!' : botName + ' wins.');
            } else if (game.in_draw()) {
                statusText = 'Game Over! Draw position.';
            } else {
                statusText = isBotTurn ? botName + ' is thinking...' : "Your turn";
                if (game.in_check()) statusText += ' - CHECK!';
            }
            $status.html(statusText);

            // Populate notation log strings
            var history = game.history();
            var html = '';
            for (var i = 0; i < history.length; i += 2) {
                var moveNum = Math.floor(i / 2) + 1;
                var whiteMove = history[i];
                var blackMove = history[i + 1] ? history[i + 1] : '';
                html += '<div class="move-row"><span class="move-number">' + moveNum + '.</span><span>' + whiteMove + '</span><span>' + blackMove + '</span></div>';
            }
            $historyContainer.html(html);
            $historyContainer.scrollTop($historyContainer[0].scrollHeight);
        }

        // Basic Evaluation mapping
        function getPieceValue(piece) {
            if (piece === null) return 0;
            var values = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
            var value = values[piece.type];
            return piece.color === 'w' ? value : -value;
        }

        function evaluateBoard(boardState) {
            var totalEvaluation = 0;
            for (var i = 0; i < 8; i++) {
                for (var j = 0; j < 8; j++) {
                    totalEvaluation += getPieceValue(boardState[i][j]);
                }
            }
            return totalEvaluation;
        }

        // Minimax deep loop calculation module with alpha-beta processing cuts
        function minimax(depth, alpha, beta, isMaximizingPlayer) {
            if (depth === 0 || game.game_over()) return evaluateBoard(game.board());
            var possibleMoves = game.moves();

            if (isMaximizingPlayer) {
                var bestValue = -99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.max(bestValue, minimax(depth - 1, alpha, beta, false));
                    game.undo();
                    alpha = Math.max(alpha, bestValue);
                    if (beta <= alpha) break;
                }
                return bestValue;
            } else {
                var bestValue = 99999;
                for (var i = 0; i < possibleMoves.length; i++) {
                    game.move(possibleMoves[i]);
                    bestValue = Math.min(bestValue, minimax(depth - 1, alpha, beta, true));
                    game.undo();
                    beta = Math.min(beta, bestValue);
                    if (beta <= alpha) break;
                }
                return bestValue;
            }
        }

        // Main AI trigger control
        function makeBestMove() {
            var possibleMoves = game.moves();
            if (game.game_over()) { updateStatusAndLog(); return; }

            possibleMoves.sort(function() { return 0.5 - Math.random(); });
            
            // DYNAMIC DIFFICULTY ASSIGNMENT
            // Pull depth config values directly out of current select element weights
            var selectedBotDifficulty = parseInt($('#bot-select').val()); // 1, 2, or 3
            var searchDepth = selectedBotDifficulty; 
            
            var bestMove = null;
            // White wants to maximize values (+), Black wants to minimize values (-)
            var isBotWhite = game.turn() === 'w';
            var bestValue = isBotWhite ? -99999 : 99999;

            for (var i = 0; i < possibleMoves.length; i++) {
                var move = possibleMoves[i];
                game.move(move);
                
                // Pass depth balance offset down into calculation recursive layers
                var boardValue = minimax(searchDepth - 1, -100000, 100000, !isBotWhite); 
                game.undo();

                if (isBotWhite) {
                    if (boardValue > bestValue) {
                        bestValue = boardValue;
                        bestMove = move;
                    }
                } else {
                    if (boardValue < bestValue) {
                        bestValue = boardValue;
                        bestMove = move;
                    }
                }
            }

            var testGame = new Chess(game.fen());
            var moveDetails = testGame.move(bestMove);
            var isCapture = moveDetails && (moveDetails.captured || moveDetails.flags.includes('e'));

            game.move(bestMove);
            board.position(game.fen());
            playSound(isCapture);
            updateStatusAndLog();
        }

        // Input drop capture rule validation check handler
        function onDrop (source, target, piece, newPos, oldPos, orientation) {
            var userColor = $('#color-select').val();
            
            // Guard Rule Clause: Stop user from moving opposing color assets during match configurations
            if (game.turn() !== userColor) return 'snapback';
            if (piece.search(new RegExp('^' + userColor)) === -1) return 'snapback';

            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            var isCapture = move.captured || move.flags.includes('e');
            playSound(isCapture);
            updateStatusAndLog();

            // Trigger computer calculation loop
            window.setTimeout(function() {
                board.position(game.fen());
                window.setTimeout(makeBestMove, 250);
            }, 250);
        }

        // Wipe board, switch colors, and initialize start queues
        function resetGame() {
            game.reset();
            
            var userColor = $('#color-select').val();
            // Flip the graphics orientation to match selection viewpoints
            board.orientation(userColor === 'w' ? 'white' : 'black');
            board.start();
            updateStatusAndLog();

            // If user selects Black, the bot must execute the opening White move instantly!
            if (userColor === 'b') {
                window.setTimeout(makeBestMove, 500);
            }
        }

        var config = {
            position: 'start',
            draggable: true,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDrop: onDrop 
        };
        
        board = Chessboard('my-board', config);
        updateStatusAndLog();
    </script>
</body>
</html>
